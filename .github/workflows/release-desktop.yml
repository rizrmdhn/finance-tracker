name: Release Desktop

on:
  push:
    tags:
      - "desktop/v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --tag-pattern "desktop/v.*"
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/desktop/}"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    strategy:
      matrix:
        include:
          - os: windows-latest
            args: --win
            artifact: |
              apps/desktop/dist/**/*.exe
              apps/desktop/dist/latest.yml
          - os: macos-latest
            args: --mac
            artifact: |
              apps/desktop/dist/**/*.dmg
              apps/desktop/dist/latest-mac.yml
          - os: ubuntu-latest
            args: --linux
            artifact: |
              apps/desktop/dist/**/*.AppImage
              apps/desktop/dist/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & package desktop
        run: bunx electron-vite build && bunx electron-builder ${{ matrix.args }} --publish never
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_OVERRIDE_DIST_PATH: ${{ github.workspace }}/node_modules/electron/dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "desktop-*"
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          files: artifacts/**/*
