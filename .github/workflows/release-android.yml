name: Release Android

on:
  push:
    tags:
      - "mobile/v*"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --tag-pattern "mobile/v.*"
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/mobile/}"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-android:
    name: Build Android
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Skia binaries
        uses: actions/cache@v4
        id: skia-cache
        with:
          path: apps/native/node_modules/@shopify/react-native-skia/libs
          key: skia-${{ hashFiles('apps/native/node_modules/@shopify/react-native-skia/package.json') }}

      - name: Install Skia binaries
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: bunx install-skia
        working-directory: apps/native

      - name: Prebuild Android
        working-directory: apps/native
        run: bunx expo prebuild --platform android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/native/android/app/release.keystore

      - name: Build release APK
        working-directory: apps/native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          TAG="${GITHUB_REF#refs/tags/mobile/v}"
          OUT=apps/native/android/app/build/outputs/apk/release
          mv "$OUT/app-arm64-v8a-release.apk"   "$OUT/Finance-Tracker-${TAG}-arm64-v8a.apk"
          mv "$OUT/app-armeabi-v7a-release.apk"  "$OUT/Finance-Tracker-${TAG}-armeabi-v7a.apk"
          mv "$OUT/app-x86_64-release.apk"       "$OUT/Finance-Tracker-${TAG}-x86_64.apk"
          mv "$OUT/app-universal-release.apk"    "$OUT/Finance-Tracker-${TAG}-universal.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: apps/native/android/app/build/outputs/apk/release/Finance-Tracker-*.apk

  release:
    name: Create GitHub Release
    needs: [prepare, build-android]
    runs-on: ubuntu-latest

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: rizrmdhn/finance-tracker-mobile
          token: ${{ secrets.MOBILE_RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          files: artifacts/**/*
